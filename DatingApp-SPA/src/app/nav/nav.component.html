<nav  class="navbar navbar-expand-md navbar-dark bg-primary">
  <div class="container">
  <a class="navbar-brand" href="#">Dating App</a>

    <ul *ngIf="loggedIn()" class="navbar-nav mr-auto">
      <li class="nav-item active">
        <a class="nav-link" href="#">Matches</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Lists</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Messages</a>
      </li>
    </ul>


    <div class="dropdown" *ngIf="loggedIn()" dropdown>
      <a  class="dropdown-toggle text-light mr-3" dropdownToggle>
        Welcome {{authService.decodedToken?.unique_name}}
      </a>

      <div class="dropdown-menu mt-3" *dropdownMenu>
        <a class="dropdown-item" href="#"><i class="fa fa-user"></i> Edit profile</a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" href="#" (click)="logout()"><i class="fa fa-sign-out"></i> Log Out</a>
      </div>
    </div>

    <!-- ANGULAR TEMPLATE FORMS -->

    <form *ngIf="!loggedIn()" #loginForm="ngForm" class="form-inline my-2 my-lg-0" (ngSubmit)="login()">
      <input [(ngModel)]="model.username" name="username" class="form-control mr-sm-2" type="text" placeholder="Username" required>
      <input [(ngModel)]="model.password" id="password" name="password" class="form-control mr-sm-2" type="password" placeholder="Password" required>
      <button [disabled]="!loginForm.valid" class="btn btn-danger my-2 my-sm-0" type="submit">Login</button>
    </form>
  </div>
</nav>
