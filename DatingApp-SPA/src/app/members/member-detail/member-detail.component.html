<div class="container mt-4">
  <div class="row">
    <div class="col-sm-4">
      <div class="card">
        <h5 class="card-header">{{ user.knownAs }}</h5>
        <img class="card-img-top img-thumbnail" [src]="user.photoUrl" [alt]="user.knownAs">
        <div class="card-body">
          <div>
            <strong>Location:</strong>
            <p>{{user.city}}, {{user.country}}</p>
          </div>
          <div>
            <strong>Age:</strong>
            <p>{{user.age}}</p>
          </div>
          <div>
            <strong>Last active:</strong>
            <p>{{user.lastActive}}</p>
          </div>
          <div>
            <strong>Member since:</strong>
            <p>{{user.created}}</p>
          </div>
        </div>
        <div class="card-footer">
          <div class="btn-group d-flex">
            <button class="btn btn-primary w-100">Like</button>
            <button class="btn btn-success w-100">Message</button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-8">
        <div class="tab-panel">
            <tabset class="member-tabset">
              <tab heading="About {{ user.knownAs }}" id="tab1">
                <h4>Description</h4>
                <p>{{ user.introduction }}</p>
                <h4>Looking for</h4>
                <p>{{ user.lookingFor }}</p>
              </tab>
              <tab heading="Interests">
                <h4>Interests</h4>
                <p>{{ user.interests }}</p>
              </tab>
              <tab heading="Photos">
                <div *ngFor="let image of imageUrls" class="photo">
                  <img src="{{ image.url }}" alt="">
                </div>
              </tab>
              <tab heading="Messages">Messages</tab>
            </tabset>
          </div>

    </div>
  </div>
</div>
